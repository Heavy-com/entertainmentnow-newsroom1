<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EntertainmentNow — Newsroom Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b; --surface: #111113; --surface2: #18181c; --surface3: #1f1f25;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #f0ede8; --text2: #9b9794; --text3: #5a5855;
    --red: #e8412a; --red-dim: rgba(232,65,42,0.12); --red-glow: rgba(232,65,42,0.25);
    --green: #2d9c5f; --green-dim: rgba(45,156,95,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* HEADER */
  .header { border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 54px; position: sticky; top: 0; background: rgba(10,10,11,0.96); backdrop-filter: blur(12px); z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .wordmark { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 900; letter-spacing: -0.02em; }
  .wordmark span { color: var(--red); }
  .live-badge { display: flex; align-items: center; gap: 5px; background: var(--red-dim); border: 1px solid rgba(232,65,42,0.3); border-radius: 4px; padding: 3px 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--red); letter-spacing: 0.08em; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); animation: blink 1.2s infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .clock { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .refresh-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); padding: 5px 12px; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { background: var(--surface3); color: var(--text); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TICKER */
  .ticker { background: var(--red); padding: 6px 0; overflow: hidden; display: flex; align-items: center; flex-shrink: 0; }
  .ticker-label { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; color: rgba(255,255,255,0.9); padding: 0 14px; white-space: nowrap; border-right: 1px solid rgba(255,255,255,0.3); margin-right: 14px; flex-shrink: 0; }
  .ticker-track { display: flex; gap: 48px; animation: scroll 50s linear infinite; white-space: nowrap; }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes scroll { from{transform:translateX(0)}to{transform:translateX(-50%)} }
  .ticker-item { font-size: 12px; color: rgba(255,255,255,0.92); font-weight: 500; }
  .ticker-sep { color: rgba(255,255,255,0.4); margin: 0 4px; }

  /* LAYOUT */
  .main { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 86px); }

  /* SIDEBAR */
  .sidebar { border-right: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 86px; height: calc(100vh - 86px); overflow-y: auto; scrollbar-width: thin; }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; padding: 0 1rem; margin-bottom: 6px; }
  .search-wrap { padding: 0 0.75rem; margin-bottom: 0.5rem; }
  .sidebar-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 10px; outline: none; }
  .sidebar-search::placeholder { color: var(--text3); }
  .sidebar-search:focus { border-color: var(--border2); }
  .filter-btn { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 6px 1rem; background: none; border: none; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; text-align: left; transition: all 0.12s; border-left: 2px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .filter-btn:hover { color: var(--text); background: var(--surface2); }
  .filter-btn.active { color: var(--text); border-left-color: var(--red); background: var(--red-dim); }
  .filter-count { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; margin-left: 6px; }
  .filter-btn.active .filter-count { color: var(--red); }
  .cat-group-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; padding: 8px 1rem 4px; margin-top: 4px; }

  /* CONTENT */
  .content { padding: 1.25rem; overflow: hidden; }
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 1.25rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
  .stat-label { font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .content-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .main-search { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 12px; outline: none; transition: border-color 0.15s; }
  .main-search::placeholder { color: var(--text3); }
  .main-search:focus { border-color: var(--border2); }
  .sort-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; cursor: pointer; }
  .result-count { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; white-space: nowrap; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.15s, transform 0.15s; display: flex; flex-direction: column; animation: fadeIn 0.3s ease both; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card.breaking { border-color: rgba(232,65,42,0.4); }
  .card-img { width: 100%; height: 150px; object-fit: cover; display: block; background: var(--surface2); }
  .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 7px; }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .source-tag { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; letter-spacing: 0.03em; }
  .cat-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--surface3); color: var(--text2); }
  .breaking-tag { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 4px; background: var(--red-dim); color: var(--red); border: 1px solid rgba(232,65,42,0.25); letter-spacing: 0.05em; }
  .card-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-left: auto; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .card-excerpt { font-size: 12px; color: var(--text2); line-height: 1.6; flex: 1; }
  .card-footer { padding: 8px 14px 12px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); }
  .card-author { font-size: 11px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
  .btn-assign { background: var(--red); color: #fff; border: none; border-radius: 6px; padding: 5px 11px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-assign:hover { opacity: 0.85; }
  .btn-assign.assigned { background: var(--green); cursor: default; }
  .btn-read { background: none; border: 1px solid var(--border2); color: var(--text2); border-radius: 6px; padding: 5px 11px; font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .btn-read:hover { background: var(--surface2); color: var(--text); }

  /* STATES */
  .state-box { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; gap: 12px; color: var(--text3); font-size: 13px; }
  .spinner { width: 26px; height: 26px; border: 2px solid var(--border2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .error-msg { color: var(--red); font-size: 13px; text-align: center; max-width: 400px; line-height: 1.6; }

  ::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="wordmark">entertainment<span>now</span></div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock"></div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAllNews()">
      <svg id="refreshIcon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</header>

<div class="ticker">
  <div class="ticker-label">BREAKING</div>
  <div class="ticker-track" id="tickerTrack"><span class="ticker-item">Loading latest headlines…</span><span class="ticker-item">Loading latest headlines…</span></div>
</div>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="search-wrap">
        <input class="sidebar-search" type="text" placeholder="Filter categories…" id="catSearch" oninput="renderSidebar()" />
      </div>
      <button class="filter-btn active" id="btn-all" onclick="setCategory('all', this)">All Stories <span class="filter-count" id="count-all">—</span></button>
      <button class="filter-btn" id="btn-breaking" onclick="setCategory('breaking', this)">🔴 Breaking <span class="filter-count" id="count-breaking">—</span></button>
      <button class="filter-btn" id="btn-instagram" onclick="setCategory('instagram', this)">📸 Instagram <span class="filter-count" id="count-instagram">—</span></button>
      <button class="filter-btn" id="btn-twitter" onclick="setCategory('twitter', this)">𝕏 X / Twitter <span class="filter-count" id="count-twitter">—</span></button>
    </div>
    <div id="sidebarCats"></div>
  </aside>

  <main class="content">
    <div class="stats-row" style="grid-template-columns:repeat(6,1fr)">
      <div class="stat-card"><div class="stat-label">Total Stories</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">this refresh</div></div>
      <div class="stat-card"><div class="stat-label">Breaking</div><div class="stat-value" id="stat-breaking" style="color:var(--red)">—</div><div class="stat-sub">flagged stories</div></div>
      <div class="stat-card"><div class="stat-label">Categories</div><div class="stat-value" id="stat-cats">—</div><div class="stat-sub">with coverage</div></div>
      <div class="stat-card"><div class="stat-label">Instagram</div><div class="stat-value" id="stat-instagram" style="color:#e1306c">—</div><div class="stat-sub">posts</div></div>
      <div class="stat-card"><div class="stat-label">X Posts</div><div class="stat-value" id="stat-twitter" style="color:#1d9bf0">—</div><div class="stat-sub">tweets</div></div>
      <div class="stat-card"><div class="stat-label">Last Updated</div><div class="stat-value" id="stat-updated" style="font-size:17px;padding-top:6px">—</div><div class="stat-sub">&nbsp;</div></div>
    </div>
    <div class="content-toolbar">
      <input class="main-search" type="text" placeholder="Search headlines…" id="searchInput" oninput="renderCards()" />
      <select class="sort-select" id="sortSelect" onchange="renderCards()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
      <span class="result-count" id="resultCount">—</span>
    </div>
    <div class="cards-grid" id="cardsGrid">
      <div class="state-box"><div class="spinner"></div><span>Connecting to NewsAPI…</span></div>
    </div>
  </main>
</div>

<script>
// ─── CATEGORY DEFINITIONS ───────────────────────────────────────────────────
// Each category has: label, group, keywords (for matching), query (for NewsAPI)
const CATEGORIES = [
  // REALITY TV

  { id:'thetraitors',  label:"The Traitors",         group:"Reality TV",      keywords:["the traitors"],                                   query:"The Traitors Peacock" },
  { id:'theview',     label:"The View",              group:"Reality TV",      keywords:["the view abc","whoopi","joy behar"],              query:"The View ABC" },
  { id:'thevoice',    label:"The Voice",             group:"Reality TV",      keywords:["the voice nbc","voice coach","voice winner"],     query:"The Voice NBC" },
  { id:'realhousewives',label:"Real Housewives",     group:"Reality TV",      keywords:["real housewives","rhony","rhoa","rhobh","rhonj","vanderpump"], query:"Real Housewives Bravo" },
  { id:'realitytv',   label:"Reality TV",            group:"Reality TV",      keywords:["reality tv","reality show","reality star"],       query:"reality TV show" },

  // NETWORK & CABLE SHOWS
  { id:'bravoTV',     label:"Bravo TV",              group:"Network & Cable", keywords:["bravo","bravo tv","bravo network"],               query:"Bravo TV network" },
  { id:'greysanatomy',label:"Grey's Anatomy",        group:"Network & Cable", keywords:["grey's anatomy","greys anatomy","meredith grey"], query:"Grey's Anatomy ABC" },
  { id:'soaps',       label:"Soaps",                 group:"Network & Cable", keywords:["days of our lives","general hospital","young and the restless","bold and beautiful","soap opera"], query:"soap opera daytime TV" },
  { id:'90stvstars',  label:"'90s TV Stars",         group:"Network & Cable", keywords:["90s tv","90s sitcom","friends reunion","saved by the bell","fresh prince"], query:"90s TV stars where are they now" },
  { id:'friendstv',   label:"Friends TV",            group:"Network & Cable", keywords:["friends tv","friends reunion","jennifer aniston friends","courteney cox","lisa kudrow","matt leblanc","matthew perry","david schwimmer"], query:"Friends TV show cast" },
  { id:'mtv',         label:"MTV",                   group:"Network & Cable", keywords:["mtv","mtv show","jersey shore","the challenge mtv"], query:"MTV show" },

  // STREAMING
  { id:'netflix',     label:"Netflix",               group:"Streaming",       keywords:["netflix","netflix series","netflix movie","netflix original"], query:"Netflix entertainment" },

  // CABLE NETWORKS
  { id:'discovery',   label:"Discovery Channel",     group:"Cable Networks",  keywords:["discovery channel","discovery plus","deadliest catch","gold rush"], query:"Discovery Channel show" },
  { id:'foodtv',      label:"Food TV",               group:"Cable Networks",  keywords:["food network","top chef","masterchef","chopped","guy fieri","ina garten"], query:"Food Network TV show" },
  { id:'hgtv',        label:"HGTV",                  group:"Cable Networks",  keywords:["hgtv","home and garden","fixer upper","property brothers","chip gaines","joanna gaines"], query:"HGTV home show" },
  { id:'historychannel',label:"History Channel",     group:"Cable Networks",  keywords:["history channel","pawn stars","curse of oak island","alone history"], query:"History Channel show" },
  { id:'lifetime',    label:"Lifetime TV",           group:"Cable Networks",  keywords:["lifetime movie","lifetime tv","lifetime network"],query:"Lifetime TV movie" },
  { id:'tlc',         label:"TLC",                   group:"Cable Networks",  keywords:["tlc network","90 day fiance","say yes to the dress","sister wives","little people big world"], query:"TLC network show" },

  // HALLMARK & FAMILY
  { id:'hallmark',    label:"Hallmark",              group:"Hallmark & Family",keywords:["hallmark channel","hallmark movie","hallmark christmas","hallmark romance"], query:"Hallmark Channel movie" },
  { id:'gaf',         label:"Great American Family", group:"Hallmark & Family",keywords:["great american family","great american christmas","candace cameron"], query:"Great American Family network" },
  { id:'heartland',   label:"Heartland",             group:"Hallmark & Family",keywords:["heartland cbc","heartland season","amber marshall heartland"], query:"Heartland TV show" },
  { id:'whencallsheart',label:"When Calls the Heart",group:"Hallmark & Family",keywords:["when calls the heart","wcth","hallmark hearties"],  query:"When Calls the Heart Hallmark" },
  { id:'christmasmovies',label:"Christmas Movies",   group:"Hallmark & Family",keywords:["christmas movie","holiday movie","christmas film"],query:"Christmas holiday movie" },
  { id:'romancemovies',label:"Romance Movies",       group:"Hallmark & Family",keywords:["romance movie","romantic comedy","romcom"],        query:"romance movie romantic comedy" },

  // MUSIC
  { id:'music',       label:"Music",                 group:"Music",           keywords:["music","album","single","tour","concert","grammy","billboard chart"], query:"music entertainment album" },
  { id:'countrymusic',label:"Country Music",         group:"Music",           keywords:["country music","country singer","nashville","cma awards","morgan wallen","luke bryan","carrie underwood"], query:"country music Nashville" },
  { id:'kpop',        label:"K-Pop",                 group:"Music",           keywords:["kpop","k-pop","bts","blackpink","seventeen","stray kids","twice","aespa"], query:"K-Pop music" },
  { id:'taylorswift', label:"Taylor Swift",          group:"Music",           keywords:["taylor swift","swifties","eras tour","travis kelce taylor"], query:"Taylor Swift" },

  // FILM & FRANCHISES
  { id:'disney',      label:"Disney",                group:"Film & Franchises",keywords:["disney","pixar","disney plus","disney park","walt disney"], query:"Disney entertainment news" },
  { id:'harrypotter', label:"Harry Potter",          group:"Film & Franchises",keywords:["harry potter","hogwarts","wizarding world","jk rowling","hermione","ron weasley","fantastic beasts"], query:"Harry Potter Wizarding World" },
  { id:'marvel',      label:"Marvel",                group:"Film & Franchises",keywords:["marvel","mcu","avengers","spider-man","thor","captain america","iron man","black panther","guardians"], query:"Marvel MCU" },
  { id:'starwars',    label:"Star Wars",             group:"Film & Franchises",keywords:["star wars","mandalorian","jedi","sith","lightsaber","disney plus star wars","andor","ahsoka"], query:"Star Wars Disney" },
  { id:'startrek',    label:"Star Trek",             group:"Film & Franchises",keywords:["star trek","starfleet","paramount plus trek","strange new worlds","picard","discovery star trek"], query:"Star Trek Paramount" },
  { id:'anime',       label:"Anime",                 group:"Film & Franchises",keywords:["anime","manga","crunchyroll","one piece","naruto","demon slayer","attack on titan","jujutsu kaisen"], query:"anime news" },
  { id:'horror',      label:"Horror Stars",          group:"Film & Franchises",keywords:["horror movie","horror film","scream","halloween","a24 horror","stephen king"],  query:"horror movie stars" },

  // CELEBRITY & LIFESTYLE
  { id:'celebrity',   label:"Celebrity",             group:"Celebrity & Lifestyle",keywords:["celebrity","celeb news","a-list","hollywood star"],query:"celebrity entertainment news" },
  { id:'kardashians', label:"Kardashians",           group:"Celebrity & Lifestyle",keywords:["kardashian","jenner","kim kardashian","khloe","kourtney","kylie jenner","kris jenner","kendall jenner"], query:"Kardashians Jenner" },
  { id:'theroyals',   label:"The Royals",            group:"Celebrity & Lifestyle",keywords:["royal family","prince william","kate middleton","king charles","meghan markle","prince harry","buckingham palace"], query:"British Royal Family" },
  { id:'fashion',     label:"Fashion",               group:"Celebrity & Lifestyle",keywords:["fashion","met gala","red carpet","vogue","couture","designer","style"],    query:"celebrity fashion style" },
  { id:'celebhomes',  label:"Celebrity Homes",       group:"Celebrity & Lifestyle",keywords:["celebrity home","celebrity house","mansion","celebrity real estate"],     query:"celebrity home mansion" },
  { id:'broadway',    label:"Broadway",              group:"Celebrity & Lifestyle",keywords:["broadway","tony awards","musical theater","west end","off-broadway"],     query:"Broadway musical theater" },
];

// Group order
const GROUP_ORDER = ["Reality TV","Network & Cable","Streaming","Cable Networks","Hallmark & Family","Music","Film & Franchises","Celebrity & Lifestyle"];

const BREAKING_KEYWORDS = ['breaking','exclusive','just in','confirmed','announces','drops','fired','arrested','dies','dead','cancels','splits','engaged','pregnant','resigns','officially','shock','surprise'];

// NewsAPI queries to run (grouped to stay under rate limit — 4 calls covers everything)
const API_QUERIES = [
  "Taylor Swift OR Kardashians OR Royal Family OR celebrity entertainment",
  "Netflix OR Marvel OR Disney OR Star Wars OR Harry Potter OR anime",
  "Hallmark OR Bravo OR Real Housewives OR Bachelor OR Survivor OR Big Brother OR DWTS",
  "country music OR K-Pop OR Broadway OR Grammy OR Billboard OR music tour"
];

let allArticles = [];
let instagramPosts = [];
let twitterPosts = [];
let activeCategory = 'all';

function matchCategory(article) {
  const text = ((article.title || '') + ' ' + (article.description || '')).toLowerCase();
  const matched = [];
  for (const cat of CATEGORIES) {
    if (cat.keywords.some(k => text.includes(k.toLowerCase()))) {
      matched.push(cat.id);
    }
  }
  return matched.length ? matched : ['general'];
}

function isBreaking(article) {
  const text = ((article.title || '') + ' ' + (article.description || '')).toLowerCase();
  return BREAKING_KEYWORDS.some(k => text.includes(k));
}

function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return `${Math.floor(diff)}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function getSourceColor(name) {
  const colors = ['#3b7dd8','#2d9c5f','#d4860f','#9b59b6','#e8412a','#16a085','#c0392b'];
  let h = 0;
  for (const c of (name || '')) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
}

async function fetchAllNews() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('cardsGrid').innerHTML = '<div class="state-box"><div class="spinner"></div><span>Fetching latest stories…</span></div>';

  const [igResult, twResult] = await Promise.allSettled([
    fetch('/api/instagram').then(r=>r.json()),
    fetch('/api/twitter').then(r=>r.json())
  ]);
  if (igResult.status === 'fulfilled' && igResult.value.posts) {
    instagramPosts = igResult.value.posts;
  }
  if (twResult.status === 'fulfilled' && twResult.value.tweets) {
    twitterPosts = twResult.value.tweets;
  }
  const results = await Promise.allSettled(
    API_QUERIES.map(q =>
      fetch(`/api/news?q=${encodeURIComponent(q)}&pageSize=25`)
        .then(r => r.json())
    )
  );

  const seen = new Set();
  allArticles = [];

  for (const r of results) {
    if (r.status === 'fulfilled' && r.value.articles) {
      for (const a of r.value.articles) {
        if (!seen.has(a.url) && a.title && a.title !== '[Removed]') {
          seen.add(a.url);
          a._categories = matchCategory(a);
          a._breaking = isBreaking(a);
          allArticles.push(a);
        }
      }
    }
  }

  if (!allArticles.length) {
    const msg = results[0]?.value?.message || 'Could not load articles. Check your API key or rate limit.';
    document.getElementById('cardsGrid').innerHTML = `<div class="state-box"><div class="error-msg">⚠ ${msg}</div></div>`;
    btn.classList.remove('spinning');
    return;
  }

  allArticles.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));

  updateStats();
  updateTicker();
  renderSidebar();
  renderCards();
  btn.classList.remove('spinning');
  document.getElementById('stat-updated').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function updateStats() {
  document.getElementById('stat-instagram').textContent = instagramPosts.length;
  document.getElementById('stat-twitter').textContent = twitterPosts.length;
  const twCountEl = document.getElementById('count-twitter');
  if (twCountEl) twCountEl.textContent = twitterPosts.length || '—';
  const igTabEl = document.getElementById('tab-count-instagram');
  if (igTabEl) igTabEl.textContent = instagramPosts.length;
  const igCountEl = document.getElementById('count-instagram');
  if (igCountEl) igCountEl.textContent = instagramPosts.length || '—';
  document.getElementById('count-all').textContent = (allArticles.length + instagramPosts.length + twitterPosts.length) || '—';
  document.getElementById('stat-total').textContent = allArticles.length + instagramPosts.length + twitterPosts.length;
  document.getElementById('stat-breaking').textContent = allArticles.filter(a => a._breaking).length;
  const activeCats = new Set(allArticles.flatMap(a => a._categories).filter(c => c !== 'general'));
  document.getElementById('stat-cats').textContent = activeCats.size;
}

function updateTicker() {
  const items = allArticles.filter(a => a._breaking).slice(0, 10);
  const src = (items.length ? items : allArticles.slice(0, 8));
  const html = src.map(a => `<span class="ticker-item">${a.title}<span class="ticker-sep"> · </span></span>`).join('');
  document.getElementById('tickerTrack').innerHTML = html + html;
}

function renderSidebar() {
  const search = (document.getElementById('catSearch')?.value || '').toLowerCase();

  // Count articles + instagram posts per category
  const counts = {};
  for (const a of allArticles) {
    for (const cid of a._categories) counts[cid] = (counts[cid] || 0) + 1;
  }
  for (const p of instagramPosts) {
    for (const cid of (p._categories || [])) counts[cid] = (counts[cid] || 0) + 1;
  }
  document.getElementById('count-all').textContent = allArticles.length || '—';
  document.getElementById('count-breaking').textContent = allArticles.filter(a => a._breaking).length || '—';

  // Group and render
  let html = '';
  for (const group of GROUP_ORDER) {
    const cats = CATEGORIES.filter(c => c.group === group && (!search || c.label.toLowerCase().includes(search)));
    if (!cats.length) continue;
    html += `<div class="cat-group-label">${group}</div>`;
    for (const cat of cats) {
      const count = counts[cat.id] || 0;
      const activeClass = activeCategory === cat.id ? 'active' : '';
      html += `<button class="filter-btn ${activeClass}" id="btn-${cat.id}" onclick="setCategory('${cat.id}', this)">${cat.label} <span class="filter-count">${count || '—'}</span></button>`;
    }
  }
  document.getElementById('sidebarCats').innerHTML = html;
}

function setCategory(cat, el) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderCards();
}

function renderCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let filtered;
  if (activeCategory === 'instagram') {
    filtered = instagramPosts;
  } else if (activeCategory === 'twitter') {
    filtered = twitterPosts;
  } else if (activeCategory === 'breaking') {
    filtered = allArticles.filter(a => a._breaking);
  } else if (activeCategory === 'all') {
    filtered = [...allArticles, ...instagramPosts, ...twitterPosts];
  } else {
    const newsFiltered = allArticles.filter(a => a._categories.includes(activeCategory));
    const igFiltered = instagramPosts.filter(p => p._categories && p._categories.includes(activeCategory));
    filtered = [...newsFiltered, ...igFiltered];
  }
  if (search) {
    filtered = filtered.filter(a => ((a.title||a.caption||'') + ' ' + (a.description||a.username||'')).toLowerCase().includes(search));
  }
  if (sort === 'oldest') filtered = [...filtered].reverse();

  document.getElementById('resultCount').textContent = `${filtered.length} stories`;

  if (!filtered.length) {
    document.getElementById('cardsGrid').innerHTML = '<div class="state-box"><span>No stories match this filter yet — try refreshing.</span></div>';
    return;
  }

  // Find category label for a card
const getCatLabel = (a) => {
    if (!a._categories) return null;
    const cat = CATEGORIES.find(c => a._categories.includes(c.id));
    return cat ? cat.label : null;
};

  document.getElementById('cardsGrid').innerHTML = filtered.map((a, i) => {
    const srcColor = getSourceColor(a.source?.name);
    const srcName = (a.source?.name || 'Unknown').toUpperCase().slice(0, 14);
    const catLabel = getCatLabel(a);
    const delay = Math.min(i * 25, 400);
    if (a._type === 'instagram') return renderInstagramCard(a, delay);
    if (a._type === 'twitter') return renderTwitterCard(a, delay);
    return `
      <div class="card ${a._breaking ? 'breaking' : ''}" style="animation-delay:${delay}ms">
        ${a.urlToImage ? `<img class="card-img" src="${a.urlToImage}" alt="" onerror="this.parentNode.removeChild(this)">` : ''}
        <div class="card-body">
          <div class="card-meta">
            <span class="source-tag" style="background:${srcColor}22;color:${srcColor};border:1px solid ${srcColor}44">${srcName}</span>
            ${catLabel ? `<span class="cat-tag">${catLabel}</span>` : ''}
            ${a._breaking ? '<span class="breaking-tag">BREAKING</span>' : ''}
            <span class="card-time">${timeAgo(a.publishedAt)}</span>
          </div>
          <div class="card-title">${a.title}</div>
          ${a.description ? `<div class="card-excerpt">${a.description.slice(0, 130)}${a.description.length > 130 ? '…' : ''}</div>` : ''}
        </div>
        <div class="card-footer">
          <span class="card-author">${a.author ? a.author.split(',')[0].slice(0, 28) : 'Staff'}</span>
          <div style="display:flex;gap:6px">
            <button class="btn-read" onclick="window.open('${a.url}','_blank')">Read →</button>
            <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// Clock
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

function renderInstagramCard(p, delay) {
  const initials = (p.displayName||p.username||'IG').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const caption = (p.caption||'').slice(0, 200);
  const hashtags = (p.hashtags||[]).slice(0,5);
  const time = new Date(p.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `<div class="card instagram" style="animation-delay:${delay}ms">
    <div class="ig-header">
      <div class="ig-avatar">${initials}</div>
      <div>
        <div class="ig-name">${p.displayName||p.username}</div>
        <div class="ig-handle">@${p.username}</div>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="type-tag type-ig">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:3px"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor"/></svg>
          INSTAGRAM
        </span>
        <span class="card-time">${time}</span>
      </div>
    </div>
    ${p.displayUrl ? `<img class="ig-image" src="${p.displayUrl}" alt="" onerror="this.style.display='none'">` : ''}
    <div class="ig-body">
      <div class="ig-caption">${caption}${p.caption&&p.caption.length>200?'…':''}</div>
      ${hashtags.length ? `<div class="ig-hashtags">${hashtags.map(h=>`<span class="ig-hashtag">#${h}</span>`).join('')}</div>` : ''}
    </div>
    <div class="ig-metrics">
      <div class="ig-metric">❤️ <span>${(p.likesCount||0).toLocaleString()}</span></div>
      <div class="ig-metric">💬 <span>${(p.commentsCount||0).toLocaleString()}</span></div>
      ${p.videoViewCount ? `<div class="ig-metric">👁 <span>${p.videoViewCount.toLocaleString()}</span></div>` : ''}
    </div>
    <div class="ig-footer">
      <span style="font-size:10px;font-family:'DM Mono',monospace;color:#e1306c">INSTAGRAM</span>
      <div style="display:flex;gap:6px">
        <button class="btn-read" onclick="window.open('${p.url}','_blank')">View →</button>
        <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
      </div>
    </div>
  </div>`;
}

function renderTwitterCard(t, delay) {
  const initials = (t.displayName || t.username || 'X').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const text = (t.text || '').slice(0, 280);
  const time = t.timestamp ? new Date(t.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
  return `<div class="card twitter" style="animation-delay:${delay}ms">
    <div class="ig-header">
      <div class="ig-avatar" style="background:#1d9bf022;color:#1d9bf0;border:1px solid #1d9bf044">${initials}</div>
      <div>
        <div class="ig-name">${t.displayName || t.username}</div>
        <div class="ig-handle">@${t.username}</div>
      </div>
      <div style="margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="type-tag" style="background:#1d9bf022;color:#1d9bf0;border:1px solid #1d9bf044;font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;letter-spacing:0.03em">𝕏 POST</span>
        <span class="card-time">${time}</span>
      </div>
    </div>
    <div class="ig-body">
      <div class="ig-caption" style="font-size:13px;line-height:1.6">${text}</div>
    </div>
    <div class="ig-metrics">
      <div class="ig-metric">❤️ <span>${(t.likesCount||0).toLocaleString()}</span></div>
      <div class="ig-metric">🔁 <span>${(t.retweetCount||0).toLocaleString()}</span></div>
      ${t.replyCount ? `<div class="ig-metric">💬 <span>${t.replyCount.toLocaleString()}</span></div>` : ''}
      ${t.viewCount ? `<div class="ig-metric">👁 <span>${t.viewCount.toLocaleString()}</span></div>` : ''}
    </div>
    <div class="ig-footer">
      <span style="font-size:10px;font-family:'DM Mono',monospace;color:#1d9bf0">X / TWITTER</span>
      <div style="display:flex;gap:6px">
        ${t.url ? `<button class="btn-read" onclick="window.open('${t.url}','_blank')">View →</button>` : ''}
        <button class="btn-assign" onclick="this.textContent='✓ Assigned';this.classList.add('assigned');this.disabled=true">Assign</button>
      </div>
    </div>
  </div>`;
}

window.addEventListener('load', () => {
  fetchAllNews();
  // Auto-refresh every 15 minutes to match NewsAPI cache window
  setInterval(fetchAllNews, 15 * 60 * 1000);
});
</script>
